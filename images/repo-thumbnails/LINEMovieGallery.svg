
<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgGrad)" />

  <!-- Decorative shapes -->
  <circle cx="590" cy="-50" r="250" fill="white" opacity="0.15" />
  <circle cx="50" cy="410" r="200" fill="white" opacity="0.15" />

  <!-- Abstract stripes pattern -->
  <g opacity="0.15" fill="white" transform="translate(320,180) rotate(45)">
    <rect x="-600" y="-500" width="1200" height="50" />
    <rect x="-600" y="-300" width="1200" height="50" />
    <rect x="-600" y="-100" width="1200" height="50" />
    <rect x="-600" y="100" width="1200" height="50" />
    <rect x="-600" y="300" width="1200" height="50" />
    <rect x="-600" y="500" width="1200" height="50" />
  </g>

  <!-- Center Card -->
  <rect x="40" y="60" width="560" height="240" rx="24" fill="white" filter="url(#shadow)" />

  <!-- Icon -->
  <text x="320" y="160" font-family="'Apple Color Emoji', 'Segoe UI Emoji', sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🎬</text>

  <!-- Name -->
  <text x="320" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif" font-size="42" font-weight="900" fill="#111827" text-anchor="middle" dominant-baseline="middle">LINE 動画ギャラリー</text>

  <!-- Tag Category -->
  <rect x="460" y="20" width="160" height="45" rx="10" fill="#ef4444" />
  <text x="540" y="51" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">LINE Mini App</text>

  <!-- Demo Play Label -->
  <rect x="65" y="290" width="220" height="50" rx="10" fill="#fbbf24" filter="url(#shadow)" />
  <text x="175" y="325" font-family="sans-serif" font-size="24" font-weight="900" fill="black" text-anchor="middle">▶ DEMO PLAY</text>
</svg>
